<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Maxwell's Burgers & Shakes — Weekly Scorecard</title>
<style>
:root{--hunt:#2F4734;--ox:#6B2227;--gold:#B08D2B;--parch:#F4EEE1;
  --ink:#1E1E1E;--line:#d8cdb6;--card:#fbf7ee;--muted:#6f6a5c;--alt:#f3ede0;
  --up:#1a6b3a;--dn:#8b1a1a;--neu:#5a5246;--r:10px}
*{box-sizing:border-box}
body{margin:0;background:var(--parch);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  font-size:14px;line-height:1.45;padding-bottom:60px}
h1,h2,h3{font-family:Georgia,serif}
.top{background:var(--hunt);padding:16px 20px 14px}
.top b{font-family:Georgia;font-size:20px;color:#fff;display:block}
.top .sub{font-size:12px;color:#adc4ad;margin-top:3px}
.wrap{max-width:1180px;margin:0 auto;padding:20px 16px}
h2.sec{font-size:19px;color:var(--hunt);border-bottom:2px solid var(--gold);
  padding-bottom:6px;margin:24px 0 6px}
.lede{color:var(--muted);font-size:13px;margin:4px 0 14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  padding:16px;margin-bottom:12px;box-shadow:0 2px 6px rgba(0,0,0,.07)}
.card-title{font-family:Georgia;font-size:14px;font-weight:700;color:var(--hunt);margin:0 0 12px}
.note{background:#fff6ec;border:1px solid var(--gold);border-left:4px solid var(--hunt);
  padding:9px 13px;font-size:13px;color:#4a463c;border-radius:0 var(--r) var(--r) 0;margin:10px 0}
.note a{color:var(--hunt)}
.loading{text-align:center;padding:60px 20px;color:var(--muted);font-size:15px}
.loading .spinner{width:32px;height:32px;border:3px solid var(--line);border-top-color:var(--hunt);
  border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
select{font:inherit;font-size:13px;padding:5px 8px;border:1px solid var(--line);
  border-radius:6px;background:var(--card);color:var(--ink);cursor:pointer}
.ctrl{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;align-items:center}
.ctrl label{font-size:12px;font-weight:700;color:var(--muted)}
.sc-table{width:100%;border-collapse:collapse;font-size:13px}
.sc-table th{background:var(--hunt);color:#f3efe3;padding:8px 10px;
  text-align:center;font-size:11.5px;font-weight:600;white-space:nowrap;position:sticky;top:0}
.sc-table th:first-child{text-align:left;min-width:190px}
.sc-table td{padding:6px 10px;border-bottom:1px solid var(--line);text-align:center}
.sc-table td:first-child{text-align:left;font-weight:600}
.sc-table tr:nth-child(even) td{background:var(--alt)}
.sc-grouprow td{background:var(--hunt)!important;color:var(--gold);
  font-family:Georgia;font-weight:700;font-size:11px;text-transform:uppercase;
  letter-spacing:.5px;text-align:left;padding:5px 10px}
.d-up{color:var(--up);font-weight:700}
.d-dn{color:var(--dn);font-weight:700}
.d-neu{color:var(--neu)}
.dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;flex-shrink:0}
.metric-row{display:flex;justify-content:space-between;align-items:center;
  padding:5px 0;border-bottom:1px solid var(--line);font-size:12.5px;gap:8px}
.metric-row:last-child{border:none}
.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
svg{display:block;overflow:visible}
.hist-table{border-collapse:collapse;font-size:11.5px}
.hist-table td,.hist-table th{padding:5px 7px;border:1px solid var(--line);text-align:center}
.hist-table th{background:var(--hunt);color:#fff;font-size:10.5px}
@media(max-width:640px){.two{grid-template-columns:1fr}.sc-table{font-size:11.5px}}
</style>

<script>

const HUNT="#2F4734",OX="#6B2227",GOLD="#B08D2B",GREY="#9a9584";

function fv(v,fmt){
  if(v==null)return'—';
  if(fmt==='$')return '$'+parseFloat(v).toFixed(2);
  if(fmt==='n')return Number.isInteger(v)?String(v):parseFloat(v).toFixed(2);

}
function dclass(d){if(!d||d==='—')return'd-neu';return (d.startsWith('-'))?'d-dn':'d-up';}

function init(){

  function renderTable(wk){

  function renderMini(elid,wk,dkey){

    const path=weeks.map((w,i)=>`${i?'L':'M'}${xi(i).toFixed(1)},${y(w.v).toFixed(1)}`).join(' ');
    const ay=y(ylo).toFixed(1);
    g+=`<path d="${path} L${xi(weeks.length-1)},${ay} L${xi(0)},${ay} Z" fill="${col}" opacity=".10"/>`;
    g+=`<path d="${path}" fill="none" stroke="${col}" stroke-width="2"/>`;
    weeks.forEach((w,i)=>{g+=`<circle cx="${xi(i).toFixed(1)}" cy="${y(w.v).toFixed(1)}" r="4" fill="${col}" opacity=".9"/>`;
      if(i%4===0||i===weeks.length-1){const p=w.wk.split('-W');
        g+=`<text x="${xi(i).toFixed(1)}" y="${H-B+14}" text-anchor="middle" font-size="8.5" fill="${GREY}">W${p[1]}'${p[0].slice(2)}</text>`;}});
    const svg=el('trend_svg'); svg.innerHTML=g;
    svg.onmousemove=e=>{const rect=svg.getBoundingClientRect();const px=(e.clientX-rect.left)*W/rect.width;
      const step=(W-L-R)/Math.max(weeks.length-1,1);const i=Math.max(0,Math.min(weeks.length-1,Math.round((px-L)/step)));
      const w=weeks[i];el('trend_tip').innerHTML=`<b>${w.label}</b> · ${m[1]}: <b style="color:${col}">${fv(w.v,fmt)}</b> · ${w.n} checks · ${w.season}`;};}
  tmet.onchange=drawTrend; tbl.onchange=drawTrend; drawTrend();

  const hmet=el('hist_met');
  hmet.innerHTML=METS.map(m=>`<option value="${m[0]}">${m[1]}</option>`).join('');
  hmet.value=METS[0][0];
  function drawGrid(){
    const key=hmet.value; const m=METS.find(x=>x[0]===key)||METS[0]; const fmt=m[2];
    const weeks=HIST.filter(w=>w[key]!=null);
    if(!weeks.length){el('hist_grid').innerHTML='<p style="color:var(--muted)">No history for this metric yet.</p>';return;}
    const vals=weeks.map(w=>w[key]); const lo=Math.min(...vals),hi=Math.max(...vals);
    const byYear={}; weeks.forEach(w=>{const yr=w.week_key.split('-W')[0];(byYear[yr]=byYear[yr]||[]).push(w);});
    let t=`<table class="hist-table" style="width:max-content">`;
    Object.keys(byYear).sort().forEach(yr=>{
      t+=`<tr><td style="font-weight:700;background:var(--alt);white-space:nowrap;padding:5px 10px">${yr}</td>`;
      byYear[yr].forEach(w=>{const v=w[key];const heat=(v-lo)/(hi-lo||1);
        const bg=`rgba(47,71,52,${(0.06+heat*0.72).toFixed(2)})`;const fg=heat>0.55?'#fff':'var(--ink)';
        const wn=w.week_key.split('-W')[1];const act=activeWk&&activeWk.week_key===w.week_key;
        t+=`<td onclick="loadWeek('${w.week_key}')" title="${w.date_range||w.week_key}: ${fv(v,fmt)}"
          style="background:${bg};color:${fg};cursor:pointer;${act?'outline:2px solid var(--gold);outline-offset:-2px':''}">
          <div style="font-size:9px;opacity:.7">W${wn}</div><div style="font-weight:700">${fv(v,fmt)}</div></td>`;});
      t+=`</tr>`;});
    el('hist_grid').innerHTML=t+'</table>';}
  hmet.onchange=drawGrid; drawGrid();

  window.loadWeek=wk_key=>{const wk=HIST.find(w=>w.week_key===wk_key);
    if(wk){activeWk=wk;wsel.value=HIST.indexOf(wk);renderAll(wk);drawGrid();window.scrollTo(0,0);}};
  renderAll(LW);
}
init();
</script>
